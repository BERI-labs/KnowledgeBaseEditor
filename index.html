<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beri Knowledge Base Editor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<!-- ══════════════════════════════════════════ UPLOAD SCREEN -->
<div id="upload-screen" class="screen active">
  <div class="upload-logo">
    <div class="upload-logo-mark">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6zm-1 1.5L18.5 9H13V3.5zM6 20V4h5v7h7v9H6z"/></svg>
    </div>
    <span class="upload-logo-text">Beri · Knowledge Base</span>
  </div>

  <div class="upload-card">
    <h1>Knowledge Base Editor</h1>
    <p>Upload your Beri markdown file to begin editing. All changes are saved locally in your browser.</p>

    <div id="drop-zone" class="drop-zone" onclick="document.getElementById('file-input').click()">
      <div class="drop-zone-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
      </div>
      <div class="drop-zone-label">Drop your .md file here</div>
      <div class="drop-zone-sub">or <span onclick="event.stopPropagation(); document.getElementById('file-input').click()">browse files</span></div>
    </div>

    <input type="file" id="file-input" accept=".md,.txt" />

    <div id="resume-box" class="resume-box">
      <div class="resume-box-label">Saved session found</div>
      <div id="resume-filename" class="resume-filename"></div>
      <div class="resume-actions">
        <button class="btn btn-primary" id="btn-resume">Resume editing</button>
        <button class="btn btn-secondary" id="btn-discard-cache">Upload new file</button>
      </div>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════ EDITOR SCREEN -->
<div id="editor-screen" class="screen">

  <!-- Header -->
  <header class="editor-header">
    <div class="header-left">
      <div class="header-logo-mark">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6zm-1 1.5L18.5 9H13V3.5zM6 20V4h5v7h7v9H6z"/></svg>
      </div>
      <span id="header-section-title" class="header-section-title"></span>
    </div>
    <div class="header-center">
      <span id="section-counter" class="section-counter"></span>
    </div>
    <div class="header-right">
      <button class="btn btn-secondary btn-sm" id="btn-review">Review Changes</button>
    </div>
  </header>

  <!-- Toolbar -->
  <div class="editor-toolbar">
    <button class="toolbar-btn toolbar-btn-bold" title="Bold" onclick="insertFormat('bold')"><strong>B</strong></button>
    <button class="toolbar-btn toolbar-btn-italic" title="Italic" onclick="insertFormat('italic')"><em>I</em></button>
    <div class="toolbar-divider"></div>
    <button class="toolbar-btn" title="Section Heading (##)" onclick="insertFormat('h2')">H2</button>
    <button class="toolbar-btn" title="Sub-heading (###)" onclick="insertFormat('h3')">H3</button>
    <div class="toolbar-divider"></div>
    <button class="toolbar-btn" title="Insert table" onclick="insertFormat('table')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/>
      </svg>
      Table
    </button>
    <button class="toolbar-btn" title="Blockquote" onclick="insertFormat('blockquote')">&ldquo;&rdquo;</button>
    <button class="toolbar-btn" title="Bullet list" onclick="insertFormat('bullet')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="9" y1="6" x2="20" y2="6"/><line x1="9" y1="12" x2="20" y2="12"/><line x1="9" y1="18" x2="20" y2="18"/>
        <circle cx="4" cy="6" r="1" fill="currentColor"/><circle cx="4" cy="12" r="1" fill="currentColor"/><circle cx="4" cy="18" r="1" fill="currentColor"/>
      </svg>
      List
    </button>
    <button class="toolbar-btn" title="Numbered list" onclick="insertFormat('numbered')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="10" y1="6" x2="21" y2="6"/><line x1="10" y1="12" x2="21" y2="12"/><line x1="10" y1="18" x2="21" y2="18"/>
        <path d="M4 6h1v4M4 10h2M6 18H4c0-1 2-2 2-3s-1-1.5-2-1"/>
      </svg>
      Numbered
    </button>
    <div class="toolbar-divider"></div>
    <button class="toolbar-btn" title="Insert Source line" onclick="insertFormat('source')" style="color:var(--accent);font-weight:600;">Source</button>
    <button class="toolbar-btn" title="Insert divider (---)" onclick="insertFormat('divider')">&#8212;&#8212;</button>
    <button class="toolbar-add-section" onclick="addNewSection()">+ New Section</button>
  </div>

  <!-- Flashcard area -->
  <div class="flashcard-area" id="flashcard-area">
    <div class="flashcard-track" id="flashcard-track"></div>
  </div>

  <!-- Navigation -->
  <div class="flashcard-nav">
    <button class="btn btn-secondary btn-sm" id="btn-prev" onclick="navigate(-1)">&#8592; Previous</button>
    <span style="font-size:0.8rem;color:var(--muted);" id="nav-hint">Use ← → arrow keys to navigate</span>
    <button class="btn btn-secondary btn-sm" id="btn-next" onclick="navigate(1)">Next &#8594;</button>
  </div>

  <!-- Footer -->
  <footer class="editor-footer">
    <div class="footer-left">
      <button class="btn btn-ghost btn-sm" onclick="exportMarkdown()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Export .md
      </button>
      <button class="btn btn-ghost btn-sm" onclick="emailToBeri()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/>
        </svg>
        Email to BERI
      </button>
    </div>
    <div class="footer-right">
      <span id="footer-filename" style="font-size:0.75rem;color:var(--muted);"></span>
    </div>
  </footer>
</div>

<!-- ══════════════════════════════════════════ REVIEW PANEL -->
<div id="review-panel">
  <div class="review-header">
    <div class="review-header-left">
      <h2>Review Changes</h2>
      <div class="review-meta">
        <span id="review-filename" class="review-filename"></span>
        <span id="review-badge" class="review-badge"></span>
      </div>
    </div>
    <button class="btn btn-ghost btn-sm" onclick="closeReview()">&#10005; Close</button>
  </div>

  <div class="review-body" id="review-body">
    <div class="review-empty">No changes to display.</div>
  </div>

  <div class="review-footer">
    <button class="btn btn-danger btn-sm" onclick="discardAllChanges()">Discard all changes</button>
    <div class="review-footer-right">
      <button class="btn btn-secondary btn-sm" onclick="closeReview()">Back to editing</button>
      <button class="btn btn-primary btn-sm" onclick="confirmSave()">Confirm &amp; save</button>
    </div>
  </div>
</div>

<!-- Toast container -->
<div id="toast-container"></div>

<script src="app.js"></script>
</body>
</html>
